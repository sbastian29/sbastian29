name: Generar Snake de contribuciones

on:
  # Se ejecuta cada 12 horas
  schedule:
    - cron: "0 */12 * * *"
  # Permite lanzarlo a mano desde la pestaña Actions
  workflow_dispatch:
  # También se ejecuta al hacer push a main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generar el SVG de la snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Publicar en la rama 'output'
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
